steps:
  # ---- BACKEND BUILD & DEPLOY ----
  # 1. Build the backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/loan-buster-backend:latest', './src/backend']
    id: 'Build Backend'
    waitFor: ['-']

  # 2. Push the backend image to Artifact Registry / GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/loan-buster-backend:latest']
    id: 'Push Backend'
    waitFor: ['Build Backend']

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'loan-buster-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/loan-buster-backend:latest'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - '^@^ENVIRONMENT=production@CORS_ORIGINS=https://loanbuster-demo.web.app@GEMINI_MODEL=gemini-3.1-flash-lite'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
    id: 'Deploy Backend'
    waitFor: ['Push Backend']

  # ---- FRONTEND BUILD & DEPLOY ----
  # 4. Install frontend dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
    dir: 'src/frontend'
    id: 'Install Frontend Deps'
    waitFor: ['-']

  # 5. Build frontend
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'src/frontend'
    id: 'Build Frontend'
    env:
      - 'VITE_API_URL=$_VITE_API_URL'
      - 'VITE_ANALYZE_TIMEOUT_MS=$_VITE_ANALYZE_TIMEOUT_MS'
    waitFor: ['Install Frontend Deps']

  # 6. Deploy frontend to Firebase Hosting
  - name: 'node:20'
    entrypoint: 'bash'
    secretEnv: ['FIREBASE_TOKEN']
    args:
      - '-c'
      - 'npm install -g firebase-tools && firebase deploy --project=$_FIREBASE_PROJECT --only hosting --non-interactive --token=$$FIREBASE_TOKEN'
    id: 'Deploy Frontend'
    waitFor: ['Build Frontend']

images:
  - 'gcr.io/$PROJECT_ID/loan-buster-backend:latest'

substitutions:
  _FIREBASE_PROJECT: 'loanbuster-demo'
  _VITE_API_URL: 'https://loan-buster-api-840186988033.asia-south1.run.app/api/v1'
  # Keep the browser timeout slightly above Cloud Run's 300s request timeout.
  _VITE_ANALYZE_TIMEOUT_MS: '310000'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_CI_TOKEN/versions/latest
      env: 'FIREBASE_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
